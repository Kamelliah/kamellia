<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="navbar-styles.css?v=1.1">
    <link rel="stylesheet" href="contact.css?v=1.1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Arial:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- 🔹 Navbar -->
    <nav class="navbar">
        <div class="navbar-title">Kamellia Hyacinth</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="news.html">News</a></li>
            <li><a href="contacts.html">Contact</a></li>
        </ul>

        <!-- 🔹 NAVBAR RIGHT SIDE: SEARCH + THEME DROPDOWN -->
        <div class="nav-right">
            <div class="search-container">
                <a href="#" class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></a>
            </div>

            <div class="theme-dropdown">
                <button class="theme-button">🌙 Theme</button>
                <div class="theme-menu">
                    <div class="theme-option" data-theme="light">☀️ Light Mode</div>
                    <div class="theme-option" data-theme="auto">🔄 Auto Mode</div>
                    <div class="theme-option" data-theme="dark">🌑 Dark Mode</div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 🔹 Contact Section -->
<div class="contact-wrapper">
    <div class="contact-content">
        <!-- Contact Form -->
        <div class="contact-form">
            <h2>Contact Me</h2>
            <p>Fill out the form below to get in touch.</p>
            
            <form action="https://formspree.io/f/xqapzbob" method="POST" enctype="multipart/form-data">
                <input type="hidden" name="_next" value="thankyou.html">

                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number (Optional)</label>
                        <input type="tel" id="phone" name="phone">
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject (Optional)</label>
                        <input type="text" id="subject" name="subject">
                    </div>

                    <div class="form-group">
                        <label for="inquiry">Type of Inquiry</label>
                        <select id="inquiry" name="inquiry">
                            <option>General Inquiry</option>
                            <option>Business Proposal</option>
                            <option>Support</option>
                            <option value="career">Career Opportunities</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message">Your Message</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="attachment">Attach a File (Optional, e.g., Resume, Proposal)</label>
                        <input type="file" id="attachment" name="attachment">
                    </div> 

                <div class="map-container">
    <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2914.9366762230095!2d-89.40123068451273!3d43.0730512791448!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f10!3m3!1m2!1s0x8806536fbf0f93b1%3A0x24f8df5f61ae126c!2sMadison%2C%20WI!5e0!3m2!1sen!2sus!4v1615933964116!5m2!1sen!2sus" 
        width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy">
    </iframe>
</div>

                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </div>
    </div>

    <!-- 🔹 Footer -->
    <footer class="footer">
        <p>© 2025 Kamellia Hyacinth. All Rights Reserved.</p>
    </footer>

    <!-- 🔹 Scripts -->
    <script defer src="js/theme-toggle.js"></script>
</body>
</html>
