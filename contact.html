<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="contact.css?v=1.1">
    <link rel="stylesheet" href="navbar-styles.css?v=1.1">
    
    
    <!-- FontAwesome Icons -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

    <!-- 🔹 Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-title">Kamellia Hyacinth</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="news.html">News</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
            <li class="nav-icons">
                <a href="#" class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></a>
                <select id="theme-toggle">
                    <option value="light">☀️ Light</option>
                    <option value="auto">🌗 Auto</option>
                    <option value="dark">🌙 Dark</option>
                </select>
            </li>
        </ul>
    </nav>

    <!-- 🔹 Contact Section -->
    <div class="contact-wrapper">
        <h2>Contact Me</h2>
        <p>Fill out the form below to get in touch.</p>

        <div class="contact-content">
            <!-- Contact Form -->
            <div class="contact-form">
                <form action="https://formspree.io/f/xqapzbob" method="POST" enctype="multipart/form-data">
                    <input type="hidden" name="_next" value="thankyou.html">

                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number (Optional)</label>
                        <input type="tel" id="phone" name="phone">
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject (Optional)</label>
                        <input type="text" id="subject" name="subject">
                    </div>

                    <div class="form-group">
                        <label for="inquiry">Type of Inquiry</label>
                        <select id="inquiry" name="inquiry">
                            <option>General Inquiry</option>
                            <option>Business Proposal</option>
                            <option>Support</option>
                            <option value="career">Career Opportunities</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message">Your Message</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="attachment">Attach a File (Optional, e.g., Resume, Proposal)</label>
                        <input type="file" id="attachment" name="attachment">
                    </div>

                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>

            <!-- Location & Hours -->
            <div class="location-info">
                <h3>Hours of Operation</h3>
                <p>Monday - Friday: 9:00 AM - 6:00 PM</p>
                <p>Saturday - Sunday: Closed</p>

                <h3>Location</h3>
                <p>Fitchburg, Madison, WI 53713</p>

                <!-- Embedded Google Map -->
                <div class="map-container">
                    <iframe 
                       src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2914.9366762230095!2d-89.40123068451273!3d43.0730512791448!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f10!3m3!1m2!1s0x8806536fbf0f93b1%3A0x24f8df5f61ae126c!2sMadison%2C%20WI!5e0!3m2!1sen!2sus!4v1615933964116!5m2!1sen!2sus" 
                       width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy">
                    </iframe>
                </div>
            </div>
        </div>
    </div>

    <!-- 🔹 Footer -->
    <footer class="footer">
        <p>© 2025 Kamellia Hyacinth. All Rights Reserved.</p>
    </footer>

    <!-- 🔹 JavaScript -->
    <script src="js/footer.js"></script>
    <script src="js/navbar.js"></script>
</body>
</html>
